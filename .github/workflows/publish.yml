#
# Publishes artifacts produced by the Build workflow.
#
# Trigger:
#   - workflow_dispatch: manually publishes a pre-release from a specific Build
#     workflow run id and tag.
#
# The Build workflow owns compilation and artifact upload. This workflow only
# downloads those artifacts and creates/updates a GitHub pre-release.
#

name: Publish

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: Build workflow run id that produced the artifacts
        required: true
        type: string
      tag_name:
        description: Release tag, for example v26.6.1
        required: true
        type: string

concurrency:
  group: publish-${{ inputs.run_id }}
  cancel-in-progress: false

jobs:
  pre_release:
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download build artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run download "${{ inputs.run_id }}" --repo "${{ github.repository }}" --dir artifacts

      - name: Resolve release tag
        id: release
        run: |
          tag="${{ inputs.tag_name }}"

          case "$tag" in
            v*) ;;
            *)
              echo "Release tag must start with v: $tag" >&2
              exit 1
              ;;
          esac

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Verify build metadata
        run: |
          metadata_tag_file="artifacts/release-metadata/tag.txt"
          if [ ! -f "$metadata_tag_file" ]; then
            echo "No release metadata artifact found; assuming manual rebuild artifacts."
            exit 0
          fi

          metadata_tag="$(cat "$metadata_tag_file")"
          if [ "$metadata_tag" != "${{ steps.release.outputs.tag }}" ]; then
            echo "Build metadata tag does not match publish tag." >&2
            echo "metadata: $metadata_tag" >&2
            echo "publish:  ${{ steps.release.outputs.tag }}" >&2
            exit 1
          fi

      - name: List release files
        run: find artifacts -type f | sort

      - name: Delete matching existing release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          if ! gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG does not exist yet; nothing to delete."
            exit 0
          fi

          find artifacts -type f ! -path '*/release-metadata/*' | while IFS= read -r file; do
            asset="$(basename "$file")"
            echo "Deleting existing asset if present: $asset"
            gh release delete-asset "$RELEASE_TAG" "$asset" \
              --repo "${{ github.repository }}" \
              --yes >/dev/null 2>&1 || true
          done

      - name: Publish GitHub pre-release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          prerelease: true
          make_latest: false
          files: |
            artifacts/ios/**/*
            artifacts/macos_se/**/*
            artifacts/android-universal/**/*
            artifacts/windows-x64/**/*
            artifacts/linux-x64/**/*
            artifacts/linux-arm64/**/*
          fail_on_unmatched_files: false
          generate_release_notes: true
