#
# Publishes artifacts produced by the Build workflow.
#
# Trigger:
#   - workflow_run: automatically publishes a pre-release after a successful
#     tag-triggered Build workflow.
#   - workflow_dispatch: manually publishes a pre-release from a specific Build
#     workflow run id and tag.
#
# The Build workflow owns compilation and artifact upload. This workflow only
# downloads those artifacts and creates/updates a GitHub pre-release.
#

name: Publish

on:
  workflow_run:
    workflows:
      - Build
    types:
      - completed
  workflow_dispatch:
    inputs:
      run_id:
        description: Build workflow run id that produced the artifacts
        required: true
        type: string
      tag_name:
        description: Release tag, for example v26.6.1
        required: true
        type: string

concurrency:
  group: publish-${{ github.event.workflow_run.id || inputs.run_id }}
  cancel-in-progress: false

jobs:
  pre_release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push'
      )
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write
    steps:
      - name: Resolve build run
        id: build
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
          else
            echo "run_id=${{ inputs.run_id }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download build artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run download "${{ steps.build.outputs.run_id }}" --repo "${{ github.repository }}" --dir artifacts

      - name: Resolve release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag_name }}"
          else
            tag="$(cat artifacts/release-metadata/tag.txt)"
          fi

          case "$tag" in
            v*) ;;
            *)
              echo "Release tag must start with v: $tag" >&2
              exit 1
              ;;
          esac

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: List release files
        run: find artifacts -type f | sort

      - name: Publish GitHub pre-release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          prerelease: true
          make_latest: false
          files: |
            artifacts/ios/**/*
            artifacts/macos_se/**/*
            artifacts/android-universal/**/*
            artifacts/windows-x64/**/*
            artifacts/linux-x64/**/*
            artifacts/linux-arm64/**/*
          fail_on_unmatched_files: false
          generate_release_notes: true
