#
# Publishes artifacts produced by the Build workflow.
#
# Trigger:
#   - workflow_dispatch: manually publishes a stable release from a specific Build
#     workflow run id and tag.
#
# The Build workflow owns compilation and artifact upload. This workflow only
# downloads those artifacts, creates/updates a GitHub release, and submits a
# winget update PR.
#
# Required repository secrets:
#   PACKAGE_MANAGER_GITHUB_TOKEN       GitHub PAT that can open PRs in
#                                      microsoft/winget-pkgs
#

name: Publish

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: Build workflow run id that produced the artifacts
        required: true
        type: string
      tag_name:
        description: Release tag, for example v26.6.1
        required: true
        type: string

concurrency:
  group: publish-${{ inputs.run_id }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write
    outputs:
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Download build artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run download "${{ inputs.run_id }}" --repo "${{ github.repository }}" --dir artifacts

      - name: Resolve release tag
        id: release
        run: |
          tag="${{ inputs.tag_name }}"

          case "$tag" in
            v*) ;;
            *)
              echo "Release tag must start with v: $tag" >&2
              exit 1
              ;;
          esac

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Verify build metadata
        run: |
          metadata_tag_file="artifacts/release-metadata/tag.txt"
          if [ ! -f "$metadata_tag_file" ]; then
            echo "No release metadata artifact found; assuming manual rebuild artifacts."
            exit 0
          fi

          metadata_tag="$(cat "$metadata_tag_file")"
          if [ "$metadata_tag" != "${{ steps.release.outputs.tag }}" ]; then
            echo "Build metadata tag does not match publish tag." >&2
            echo "metadata: $metadata_tag" >&2
            echo "publish:  ${{ steps.release.outputs.tag }}" >&2
            exit 1
          fi

      - name: List release files
        run: find artifacts -type f | sort

      - name: Verify complete release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          required_assets=(
            "OneXray-ios.ipa"
            "OneXray-macos-universal.zip"
            "OneXray-android-universal.apk"
            "OneXray-windows-amd64.exe"
            "OneXray-windows-amd64.zip"
            "OneXray-linux-x86_64.deb"
            "OneXray-linux-x86_64.zip"
            "OneXray-linux-aarch64.deb"
            "OneXray-linux-aarch64.zip"
          )

          incoming_assets="$(mktemp)"
          existing_assets="$(mktemp)"
          final_assets="$(mktemp)"

          find artifacts -type f ! -path '*/release-metadata/*' \
            -exec basename {} \; | sort -u > "$incoming_assets"

          if [ ! -s "$incoming_assets" ]; then
            echo "No release assets found in the selected build run." >&2
            exit 1
          fi

          if gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release view "$RELEASE_TAG" \
              --repo "${{ github.repository }}" \
              --json assets \
              --jq '.assets[].name' | sort -u > "$existing_assets"
          else
            : > "$existing_assets"
          fi

          grep -Fvx -f "$incoming_assets" "$existing_assets" > "$final_assets" || true
          cat "$incoming_assets" >> "$final_assets"
          sort -u -o "$final_assets" "$final_assets"

          missing=0
          for asset in "${required_assets[@]}"; do
            if ! grep -Fxq "$asset" "$final_assets"; then
              echo "Missing required release asset after publish: $asset" >&2
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "Stable/latest releases require the complete platform asset set." >&2
            exit 1
          fi

      - name: Delete matching existing release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          if ! gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG does not exist yet; nothing to delete."
            exit 0
          fi

          find artifacts -type f ! -path '*/release-metadata/*' | while IFS= read -r file; do
            asset="$(basename "$file")"
            echo "Deleting existing asset if present: $asset"
            gh release delete-asset "$RELEASE_TAG" "$asset" \
              --repo "${{ github.repository }}" \
              --yes >/dev/null 2>&1 || true
          done

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          prerelease: false
          make_latest: true
          files: |
            artifacts/ios/**/*
            artifacts/macos_se/**/*
            artifacts/android-universal/**/*
            artifacts/windows-x64/**/*
            artifacts/linux-x64/**/*
            artifacts/linux-arm64/**/*
          fail_on_unmatched_files: false
          generate_release_notes: true

  winget:
    needs: release
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Verify Windows release asset
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release.outputs.tag }}
        run: |
          release_json="$(gh release view "$RELEASE_TAG" \
            --repo "${{ github.repository }}" \
            --json isDraft,isPrerelease,assets)"

          if [ "$(jq -r '.isDraft' <<<"$release_json")" != "false" ]; then
            echo "Release $RELEASE_TAG is still a draft." >&2
            exit 1
          fi

          if [ "$(jq -r '.isPrerelease' <<<"$release_json")" != "false" ]; then
            echo "Release $RELEASE_TAG is a pre-release; winget is updated only from stable releases." >&2
            exit 1
          fi

          if [ -z "$(jq -r '.assets[] | select(.name == "OneXray-windows-amd64.exe") | .url' <<<"$release_json")" ]; then
            echo "Release $RELEASE_TAG is missing required asset: OneXray-windows-amd64.exe" >&2
            exit 1
          fi

      - name: Validate package manager token
        run: |
          if [ -z "${PACKAGE_MANAGER_GITHUB_TOKEN}" ]; then
            echo "PACKAGE_MANAGER_GITHUB_TOKEN is required." >&2
            exit 1
          fi
        env:
          PACKAGE_MANAGER_GITHUB_TOKEN: ${{ secrets.PACKAGE_MANAGER_GITHUB_TOKEN }}

      - name: Open winget package PR
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: YuanDevLLC.OneXray
          release-tag: ${{ needs.release.outputs.tag }}
          installers-regex: '^OneXray-windows-amd64\.exe$'
          max-versions-to-keep: 3
          fork-user: yiguodev
          token: ${{ secrets.PACKAGE_MANAGER_GITHUB_TOKEN }}
