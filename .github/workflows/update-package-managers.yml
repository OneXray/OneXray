#
# Updates external package managers from a stable GitHub Release.
#
# Trigger:
#   - release published as a stable release
#   - workflow_dispatch: manually update Homebrew, winget, or both from a tag
#
# Required repository secrets:
#   PACKAGE_MANAGER_GITHUB_TOKEN       GitHub PAT that can open PRs in
#                                      Homebrew/homebrew-cask and
#                                      microsoft/winget-pkgs
#

name: Update Package Managers

on:
  release:
    types:
      - released
  workflow_dispatch:
    inputs:
      tag_name:
        description: Stable release tag, for example v26.7.1
        required: true
        type: string
      target:
        description: Package manager target
        required: true
        type: choice
        default: all
        options:
          - all
          - homebrew
          - winget

permissions:
  contents: read

concurrency:
  group: package-managers-${{ github.event.release.tag_name || inputs.tag_name || github.run_id }}
  cancel-in-progress: false

jobs:
  resolve_release:
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      release_url: ${{ steps.release.outputs.release_url }}
      target: ${{ steps.release.outputs.target }}
      homebrew_asset_url: ${{ steps.release.outputs.homebrew_asset_url }}
      winget_asset_url: ${{ steps.release.outputs.winget_asset_url }}
    steps:
      - name: Resolve stable release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
          DISPATCH_TAG_NAME: ${{ inputs.tag_name }}
          DISPATCH_TARGET: ${{ inputs.target }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            tag="$RELEASE_TAG_NAME"
            target="all"
          else
            tag="$DISPATCH_TAG_NAME"
            target="$DISPATCH_TARGET"
          fi

          case "$tag" in
            v*) ;;
            *)
              echo "Release tag must start with v: $tag" >&2
              exit 1
              ;;
          esac

          case "$target" in
            all|homebrew|winget) ;;
            *)
              echo "Unsupported target: $target" >&2
              exit 1
              ;;
          esac

          release_json="$(gh release view "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --json isDraft,isPrerelease,url,assets)"

          if [ "$(jq -r '.isDraft' <<<"$release_json")" != "false" ]; then
            echo "Release $tag is still a draft." >&2
            exit 1
          fi

          if [ "$(jq -r '.isPrerelease' <<<"$release_json")" != "false" ]; then
            echo "Release $tag is a pre-release; package managers are updated only from stable releases." >&2
            exit 1
          fi

          require_asset() {
            local name="$1"
            local url
            url="$(jq -r --arg name "$name" '.assets[] | select(.name == $name) | .url' <<<"$release_json")"
            if [ -z "$url" ]; then
              echo "Release $tag is missing required asset: $name" >&2
              exit 1
            fi
            printf '%s' "$url"
          }

          homebrew_asset_url=""
          winget_asset_url=""

          if [ "$target" = "all" ] || [ "$target" = "homebrew" ]; then
            homebrew_asset_url="$(require_asset "OneXray-macos-universal.zip")"
          fi

          if [ "$target" = "all" ] || [ "$target" = "winget" ]; then
            winget_asset_url="$(require_asset "OneXray-windows-amd64.exe")"
          fi

          {
            echo "tag=$tag"
            echo "version=${tag#v}"
            echo "release_url=$(jq -r '.url' <<<"$release_json")"
            echo "target=$target"
            echo "homebrew_asset_url=$homebrew_asset_url"
            echo "winget_asset_url=$winget_asset_url"
          } >> "$GITHUB_OUTPUT"

  homebrew:
    needs: resolve_release
    if: needs.resolve_release.outputs.target == 'all' || needs.resolve_release.outputs.target == 'homebrew'
    runs-on: macos-26
    env:
      HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.PACKAGE_MANAGER_GITHUB_TOKEN }}
      HOMEBREW_ASSET_URL: ${{ needs.resolve_release.outputs.homebrew_asset_url }}
      VERSION: ${{ needs.resolve_release.outputs.version }}
    steps:
      - name: Validate package manager token
        run: |
          if [ -z "$HOMEBREW_GITHUB_API_TOKEN" ]; then
            echo "PACKAGE_MANAGER_GITHUB_TOKEN is required." >&2
            exit 1
          fi

      - name: Download macOS release asset
        run: curl --fail --location --output OneXray-macos-universal.zip "$HOMEBREW_ASSET_URL"

      - name: Compute SHA256
        id: sha
        run: echo "sha256=$(shasum -a 256 OneXray-macos-universal.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Open Homebrew cask PR
        run: |
          brew update
          brew bump-cask-pr onexrayse \
            --version "$VERSION" \
            --sha256 "${{ steps.sha.outputs.sha256 }}" \
            --no-browse

  winget:
    needs: resolve_release
    if: needs.resolve_release.outputs.target == 'all' || needs.resolve_release.outputs.target == 'winget'
    runs-on: windows-2022
    env:
      PACKAGE_MANAGER_GITHUB_TOKEN: ${{ secrets.PACKAGE_MANAGER_GITHUB_TOKEN }}
      RELEASE_URL: ${{ needs.resolve_release.outputs.release_url }}
      VERSION: ${{ needs.resolve_release.outputs.version }}
      WINGET_ASSET_URL: ${{ needs.resolve_release.outputs.winget_asset_url }}
    steps:
      - name: Validate package manager token
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PACKAGE_MANAGER_GITHUB_TOKEN)) {
            throw "PACKAGE_MANAGER_GITHUB_TOKEN is required."
          }

      - name: Download wingetcreate
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/microsoft/winget-create/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -eq "wingetcreate.exe" } | Select-Object -First 1
          if ($null -eq $asset) {
            throw "wingetcreate.exe was not found in the latest microsoft/winget-create release."
          }
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile wingetcreate.exe

      - name: Open winget package PR
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          .\wingetcreate.exe update YuanDevLLC.OneXray `
            --urls "$env:WINGET_ASSET_URL|x64" `
            --version "$env:VERSION" `
            --release-notes-url "$env:RELEASE_URL" `
            --submit `
            --token "$env:PACKAGE_MANAGER_GITHUB_TOKEN"
