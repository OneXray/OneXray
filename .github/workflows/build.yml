#
# Builds OneXray across all supported platforms.
#
# Trigger:
#   - workflow_dispatch: manual trigger from the Actions tab
#   - push to a tag matching `v*`: builds release artifacts
#
# Required repository secrets (set under Settings → Secrets and variables → Actions):
#
# Convention: secrets whose value is a file or a multi-line string are stored
# base64-encoded (suffix `_BASE64`) so GitHub's secret editor never mangles
# newlines or whitespace. Simple single-line identifiers / passwords are stored
# as plain strings.
#
#   Apple (iOS / macOS / macos_se):
#     FASTLANE_ASC_KEY_ID               App Store Connect API key id
#     FASTLANE_ASC_ISSUER_ID            ASC issuer id (UUID)
#     FASTLANE_ASC_KEY_BASE64           base64-encoded .p8 contents
#     FASTLANE_MAS_INSTALLER_CERT       full subject of the 3rd Party Mac Developer Installer cert
#     APPLE_DISTRIBUTION_P12_BASE64     base64 of the Apple Distribution .p12
#                                       (shared by iOS and Mac App Store app signing)
#     APPLE_MAC_INSTALLER_P12_BASE64    base64 of the 3rd Party Mac Developer Installer .p12
#     APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64
#                                       base64 of the Developer ID Application .p12
#     KEYCHAIN_PASSWORD                 password used by the .p12 files and temporary build keychain
#
#   Android:
#     ANDROID_KEYSTORE_BASE64           base64 of the upload keystore (.jks)
#     ANDROID_KEYSTORE_PASSWORD         store password
#     ANDROID_KEY_PASSWORD              key password
#     ANDROID_KEY_ALIAS                 key alias
#     ANDROID_PLAY_SERVICE_JSON_BASE64  base64 of fastlane service account JSON
#
#   Firebase / Google Services (base64 of the file contents):
#     FIREBASE_JSON_BASE64
#     FIREBASE_OPTIONS_DART_BASE64
#     ANDROID_GOOGLE_SERVICES_JSON_BASE64
#     APPLE_GOOGLE_SERVICE_INFO_PLIST_BASE64      shared by iOS + MAS macOS (same bundle id net.yuandev.onexray)
#     MACOS_SE_GOOGLE_SERVICE_INFO_PLIST_BASE64   for the SE build  (swift/macOSSE/GoogleService-Info.plist)
#
# Layout:
#   build_scripts/app/builder.py#build_core expects XTLS/libXray and
#   OneXray/Xray-core to live as siblings of this repo. Every job therefore checks
#   out this repo to `OneXray/`, libXray to `libXray/`, and Xray-core to
#   `Xray-core/` at the workspace root. libXray is built with local Xray-core,
#   and Windows/Linux app packages compile OneXrayCore directly from that same
#   sibling Xray-core checkout. fastforge/fastlane/flutter all produce their
#   outputs under `<workspace>/output`.

name: Build

on:
  workflow_dispatch:
    inputs:
      target:
        description: Build target
        required: true
        type: choice
        default: all
        options:
          - all
          - ios
          - macos
          - android
  push:
    tags:
      - "v*"

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: "stable"
  XCODE_VERSION: "latest-stable"
  PYTHON_VERSION: "3.12"
  NDK_VERSION: r29
  LIBXRAY_REF: main
  XRAY_CORE_REPOSITORY: OneXray/Xray-core
  XRAY_CORE_REF: build
  BUILD_NUMBER: ${{ github.run_number }}

jobs:
  # =================================================================
  # Release metadata — lets the separate Publish workflow recover the
  # tag name from this build run before creating a release.
  # =================================================================
  release_metadata:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    steps:
      - name: Write release metadata
        run: |
          mkdir -p release-metadata
          echo "${GITHUB_REF_NAME}" > release-metadata/tag.txt
          echo "${GITHUB_SHA}" > release-metadata/sha.txt

      - name: Upload release metadata
        uses: actions/upload-artifact@v7
        with:
          name: release-metadata
          path: release-metadata/*
          if-no-files-found: error

  # =================================================================
  # iOS — uploads to App Store Connect (TestFlight) via fastlane
  # =================================================================
  ios:
    if: github.event_name == 'push' || inputs.target == 'all' || inputs.target == 'ios'
    runs-on: macos-26
    timeout-minutes: 60
    defaults:
      run:
        working-directory: OneXray
    steps:
      - uses: actions/checkout@v6
        with:
          path: OneXray

      - uses: actions/checkout@v6
        with:
          repository: XTLS/libXray
          ref: ${{ env.LIBXRAY_REF }}
          path: libXray

      - uses: actions/checkout@v6
        with:
          repository: ${{ env.XRAY_CORE_REPOSITORY }}
          ref: ${{ env.XRAY_CORE_REF }}
          path: Xray-core

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Flutter
        run: bash build_scripts/setup_flutter.sh

      - name: Install FlutterFire CLI
        run: |
          dart pub global activate flutterfire_cli
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Install Python build deps
        run: pip install pyyaml requests typer

      - name: Restore Firebase configs
        env:
          FIREBASE_JSON_B64: ${{ secrets.FIREBASE_JSON_BASE64 }}
          FIREBASE_OPTIONS_B64: ${{ secrets.FIREBASE_OPTIONS_DART_BASE64 }}
          IOS_GSI_PLIST_B64: ${{ secrets.APPLE_GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        run: |
          echo "$FIREBASE_JSON_B64" | base64 -d > firebase.json
          echo "$FIREBASE_OPTIONS_B64" | base64 -d > lib/firebase_options.dart
          echo "$IOS_GSI_PLIST_B64" | base64 -d > swift/AppStore/GoogleService-Info.plist

      - name: Restore App Store Connect API key
        env:
          ASC_KEY_B64: ${{ secrets.FASTLANE_ASC_KEY_BASE64 }}
        run: echo "$ASC_KEY_B64" | base64 -d > ios/fastlane/AuthKey.p8

      - name: Import Apple Distribution certificate
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.APPLE_DISTRIBUTION_P12_BASE64 }}
          p12-password: ${{ secrets.KEYCHAIN_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}
          keychain: signing_temp

      - name: Verify code signing identities
        run: security find-identity -v -p codesigning

      - name: Build & upload
        env:
          FASTLANE_ASC_KEY_ID: ${{ secrets.FASTLANE_ASC_KEY_ID }}
          FASTLANE_ASC_ISSUER_ID: ${{ secrets.FASTLANE_ASC_ISSUER_ID }}
        run: python3 build_scripts/main.py OneXray ios

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ios
          path: output/OneXray-ios*.ipa
          if-no-files-found: error

  # =================================================================
  # macOS (MAS) — universal binary, uploads to App Store Connect
  # =================================================================
  macos:
    if: github.event_name == 'push' || inputs.target == 'all' || inputs.target == 'macos'
    runs-on: macos-26
    timeout-minutes: 60
    defaults:
      run:
        working-directory: OneXray
    steps:
      - uses: actions/checkout@v6
        with:
          path: OneXray

      - uses: actions/checkout@v6
        with:
          repository: XTLS/libXray
          ref: ${{ env.LIBXRAY_REF }}
          path: libXray

      - uses: actions/checkout@v6
        with:
          repository: ${{ env.XRAY_CORE_REPOSITORY }}
          ref: ${{ env.XRAY_CORE_REF }}
          path: Xray-core

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Flutter
        run: bash build_scripts/setup_flutter.sh

      - name: Install FlutterFire CLI
        run: |
          dart pub global activate flutterfire_cli
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Install Python build deps
        run: pip install pyyaml requests typer

      - name: Restore Firebase configs
        env:
          FIREBASE_JSON_B64: ${{ secrets.FIREBASE_JSON_BASE64 }}
          FIREBASE_OPTIONS_B64: ${{ secrets.FIREBASE_OPTIONS_DART_BASE64 }}
          MACOS_GSI_PLIST_B64: ${{ secrets.APPLE_GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        run: |
          echo "$FIREBASE_JSON_B64" | base64 -d > firebase.json
          echo "$FIREBASE_OPTIONS_B64" | base64 -d > lib/firebase_options.dart
          echo "$MACOS_GSI_PLIST_B64" | base64 -d > swift/AppStore/GoogleService-Info.plist

      - name: Restore App Store Connect API key
        env:
          ASC_KEY_B64: ${{ secrets.FASTLANE_ASC_KEY_BASE64 }}
        run: echo "$ASC_KEY_B64" | base64 -d > macos/fastlane/AuthKey.p8

      - name: Import Apple Distribution certificate
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.APPLE_DISTRIBUTION_P12_BASE64 }}
          p12-password: ${{ secrets.KEYCHAIN_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}
          keychain: signing_temp

      - name: Import Mac installer certificate
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.APPLE_MAC_INSTALLER_P12_BASE64 }}
          p12-password: ${{ secrets.KEYCHAIN_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}
          keychain: signing_temp
          create-keychain: false

      - name: Verify code signing identities
        run: security find-identity -v -p codesigning

      - name: Build & upload
        env:
          FASTLANE_ASC_KEY_ID: ${{ secrets.FASTLANE_ASC_KEY_ID }}
          FASTLANE_ASC_ISSUER_ID: ${{ secrets.FASTLANE_ASC_ISSUER_ID }}
          FASTLANE_MAS_INSTALLER_CERT: ${{ secrets.FASTLANE_MAS_INSTALLER_CERT }}
        run: python3 build_scripts/main.py OneXray macos

  # =================================================================
  # macOS SE (Developer ID) — universal binary, Developer ID signed
  #   + notarized + zipped
  # =================================================================
  macos_se:
    if: github.event_name == 'push' || inputs.target == 'all'
    runs-on: macos-26
    timeout-minutes: 60
    defaults:
      run:
        working-directory: OneXray
    steps:
      - uses: actions/checkout@v6
        with:
          path: OneXray

      - uses: actions/checkout@v6
        with:
          repository: XTLS/libXray
          ref: ${{ env.LIBXRAY_REF }}
          path: libXray

      - uses: actions/checkout@v6
        with:
          repository: ${{ env.XRAY_CORE_REPOSITORY }}
          ref: ${{ env.XRAY_CORE_REF }}
          path: Xray-core

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Flutter
        run: bash build_scripts/setup_flutter.sh

      - name: Install FlutterFire CLI
        run: |
          dart pub global activate flutterfire_cli
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Install Python build deps
        run: pip install pyyaml requests typer

      - name: Restore Firebase configs
        env:
          FIREBASE_JSON_B64: ${{ secrets.FIREBASE_JSON_BASE64 }}
          FIREBASE_OPTIONS_B64: ${{ secrets.FIREBASE_OPTIONS_DART_BASE64 }}
          MACOSSE_GSI_PLIST_B64: ${{ secrets.MACOS_SE_GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        run: |
          echo "$FIREBASE_JSON_B64" | base64 -d > firebase.json
          echo "$FIREBASE_OPTIONS_B64" | base64 -d > lib/firebase_options.dart
          echo "$MACOSSE_GSI_PLIST_B64" | base64 -d > swift/macOSSE/GoogleService-Info.plist

      - name: Restore App Store Connect API key
        env:
          ASC_KEY_B64: ${{ secrets.FASTLANE_ASC_KEY_BASE64 }}
        run: echo "$ASC_KEY_B64" | base64 -d > macos_se/fastlane/AuthKey.p8

      - name: Import Developer ID Application certificate
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          p12-password: ${{ secrets.KEYCHAIN_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}
          keychain: signing_temp

      - name: Verify code signing identities
        run: security find-identity -v -p codesigning

      - name: Build, notarize & staple
        env:
          FASTLANE_ASC_KEY_ID: ${{ secrets.FASTLANE_ASC_KEY_ID }}
          FASTLANE_ASC_ISSUER_ID: ${{ secrets.FASTLANE_ASC_ISSUER_ID }}
        run: python3 build_scripts/main.py OneXray macos_se

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos_se
          path: output/OneXray-macos-universal*.zip
          if-no-files-found: error

  # =================================================================
  # Android — uploads AAB to Play Store via fastlane
  # =================================================================
  android:
    if: github.event_name == 'push' || inputs.target == 'all' || inputs.target == 'android'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    defaults:
      run:
        working-directory: OneXray
    steps:
      - uses: actions/checkout@v6
        with:
          path: OneXray

      - uses: actions/checkout@v6
        with:
          repository: XTLS/libXray
          ref: ${{ env.LIBXRAY_REF }}
          path: libXray

      - uses: actions/checkout@v6
        with:
          repository: ${{ env.XRAY_CORE_REPOSITORY }}
          ref: ${{ env.XRAY_CORE_REF }}
          path: Xray-core

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Flutter
        run: bash build_scripts/setup_flutter.sh

      - name: Setup Android NDK
        # libXray's Android builder invokes `gomobile bind`, which needs an NDK.
        # nttld/setup-ndk pins the version and exports ANDROID_NDK_HOME/ANDROID_NDK_ROOT.
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true

      - name: Install Python build deps
        run: pip install pyyaml requests typer

      - name: Restore Firebase configs
        env:
          FIREBASE_JSON_B64: ${{ secrets.FIREBASE_JSON_BASE64 }}
          FIREBASE_OPTIONS_B64: ${{ secrets.FIREBASE_OPTIONS_DART_BASE64 }}
          ANDROID_GSJ_B64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          echo "$FIREBASE_JSON_B64" | base64 -d > firebase.json
          echo "$FIREBASE_OPTIONS_B64" | base64 -d > lib/firebase_options.dart
          echo "$ANDROID_GSJ_B64" | base64 -d > android/app/google-services.json

      - name: Restore Play Store service account
        env:
          PLAY_SA_B64: ${{ secrets.ANDROID_PLAY_SERVICE_JSON_BASE64 }}
        run: echo "$PLAY_SA_B64" | base64 -d > android/fastlane/playservice.json

      - name: Restore keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          mkdir -p android/keystore
          echo "$KEYSTORE_B64" | base64 -d > android/keystore/upload.jks
          cat > android/keystore/keystore.properties <<EOF
          storeFile=../keystore/upload.jks
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          EOF

      - name: Install fastlane
        run: sudo gem install fastlane --no-document

      - name: Build & upload
        run: python3 build_scripts/main.py OneXray android

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-universal
          path: output/OneXray-android-universal*.apk
          if-no-files-found: error

  # =================================================================
  # Windows x64 — fastforge .zip + .exe
  #   Pinned to windows-2022 for Visual Studio 2022 (any edition —
  #   the runner ships Enterprise, VS 2022 Community is equivalent
  #   for C++ desktop workloads).
  # =================================================================
  windows:
    if: github.event_name == 'push' || inputs.target == 'all'
    runs-on: windows-2022
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
        working-directory: OneXray
    steps:
      - uses: actions/checkout@v6
        with:
          path: OneXray

      - uses: actions/checkout@v6
        with:
          repository: XTLS/libXray
          ref: ${{ env.LIBXRAY_REF }}
          path: libXray

      - uses: actions/checkout@v6
        with:
          repository: ${{ env.XRAY_CORE_REPOSITORY }}
          ref: ${{ env.XRAY_CORE_REF }}
          path: Xray-core

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Flutter
        run: bash build_scripts/setup_flutter.sh

      - name: Install Python build deps
        run: pip install pyyaml requests typer

      - name: Restore Firebase configs
        env:
          FIREBASE_JSON_B64: ${{ secrets.FIREBASE_JSON_BASE64 }}
          FIREBASE_OPTIONS_B64: ${{ secrets.FIREBASE_OPTIONS_DART_BASE64 }}
        run: |
          echo "$FIREBASE_JSON_B64" | base64 -d > firebase.json
          echo "$FIREBASE_OPTIONS_B64" | base64 -d > lib/firebase_options.dart

      - name: Install fastforge
        run: |
          dart pub global activate fastforge
          echo "$LOCALAPPDATA/Pub/Cache/bin" >> "$GITHUB_PATH"

      - name: Build
        run: python build_scripts/main.py OneXray windows

      - name: Verify core CLI
        run: ./windows/app/OneXrayCore.exe help run | grep -- "--env"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-x64
          path: |
            output/OneXray-*.zip
            output/OneXray-*.exe
          if-no-files-found: error

  # =================================================================
  # Linux — fastforge .zip + .deb, x64 and arm64
  #   Pinned to ubuntu-24.04 (x64) / ubuntu-24.04-arm (arm64): the
  #   produced binary's glibc requirement is whatever the runner ships
  #   (glibc 2.39). Upgrading the runner image would silently bump the
  #   minimum glibc users need, so don't use `ubuntu-latest` here.
  #   ubuntu-24.04-arm is GitHub-hosted; free for public repos, paid
  #   for private ones.
  # =================================================================
  linux:
    if: github.event_name == 'push' || inputs.target == 'all'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    defaults:
      run:
        working-directory: OneXray
    steps:
      - uses: actions/checkout@v6
        with:
          path: OneXray

      - uses: actions/checkout@v6
        with:
          repository: XTLS/libXray
          ref: ${{ env.LIBXRAY_REF }}
          path: libXray

      - uses: actions/checkout@v6
        with:
          repository: ${{ env.XRAY_CORE_REPOSITORY }}
          ref: ${{ env.XRAY_CORE_REF }}
          path: Xray-core

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Flutter
        run: bash build_scripts/setup_flutter.sh

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build clang cmake pkg-config \
            libgtk-3-dev liblzma-dev libblkid-dev libsecret-1-dev \
            libayatana-appindicator3-dev \
            file

      - name: Install Python build deps
        run: pip install pyyaml requests typer

      - name: Restore Firebase configs
        env:
          FIREBASE_JSON_B64: ${{ secrets.FIREBASE_JSON_BASE64 }}
          FIREBASE_OPTIONS_B64: ${{ secrets.FIREBASE_OPTIONS_DART_BASE64 }}
        run: |
          echo "$FIREBASE_JSON_B64" | base64 -d > firebase.json
          echo "$FIREBASE_OPTIONS_B64" | base64 -d > lib/firebase_options.dart

      - name: Install fastforge
        run: |
          dart pub global activate fastforge
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Build
        run: python3 build_scripts/main.py OneXray linux

      - name: Verify core CLI
        run: ./linux/app/OneXrayCore help run | grep -- "--env"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-${{ matrix.arch }}
          path: |
            output/OneXray-*.zip
            output/OneXray-*.deb
          if-no-files-found: error
